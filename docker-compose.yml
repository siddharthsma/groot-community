services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: groot
      POSTGRES_PASSWORD: groot
      POSTGRES_DB: groot
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groot -d groot"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: groot
      POSTGRES_PWD: groot
      POSTGRES_SEEDS: postgres
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"

  ai-gateway:
    image: ${AI_GATEWAY_IMAGE}
    environment:
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-groot-ai-gateway-dev-key}
      AI_GATEWAY_OTEL_WRITE_TOKEN: ${AI_GATEWAY_OTEL_WRITE_TOKEN:-}
      AI_GATEWAY_OTEL_BASE_URL: ${AI_GATEWAY_OTEL_BASE_URL:-}
      AI_GATEWAY_OTEL_EXPORTER_PROTOCOL: ${AI_GATEWAY_OTEL_EXPORTER_PROTOCOL:-http/protobuf}
      AI_GATEWAY_LOGFIRE_TOKEN: ${AI_GATEWAY_LOGFIRE_TOKEN:-}
      AI_GATEWAY_STATUS_AUTH_API_KEY: ${AI_GATEWAY_STATUS_AUTH_API_KEY:-ai-gateway-status-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_BASE_URL: ${ANTHROPIC_API_BASE_URL:-https://api.anthropic.com}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "${AI_GATEWAY_PORT:-8787}:8787"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:8787/status',{headers:{Authorization:'Bearer '+process.env.AI_GATEWAY_STATUS_AUTH_API_KEY}})
          .then(r=>{if(!r.ok)process.exit(1);return r.text()})
          .then(()=>process.exit(0))
          .catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  agent-runtime:
    image: ${AGENT_RUNTIME_IMAGE}
    environment:
      AGENT_RUNTIME_PORT: 8090
      AGENT_RUNTIME_LOG_LEVEL: ${AGENT_RUNTIME_LOG_LEVEL:-info}
      AGENT_RUNTIME_DB_POOL_MIN: ${AGENT_RUNTIME_DB_POOL_MIN:-1}
      AGENT_RUNTIME_DB_POOL_MAX: ${AGENT_RUNTIME_DB_POOL_MAX:-10}
      AGENT_RUNTIME_DB_CONNECT_TIMEOUT_SECONDS: ${AGENT_RUNTIME_DB_CONNECT_TIMEOUT_SECONDS:-5}
      AGENT_RUNTIME_MODEL_TIMEOUT_SECONDS: ${AGENT_RUNTIME_MODEL_TIMEOUT_SECONDS:-60}
      AGENT_RUNTIME_MAX_TOOL_CALLS: ${AGENT_RUNTIME_MAX_TOOL_CALLS:-16}
      AGENT_RUNTIME_TOOL_TIMEOUT_SECONDS: ${AGENT_RUNTIME_TOOL_TIMEOUT_SECONDS:-20}
      POSTGRES_DSN: postgres://groot:groot@postgres:5432/groot?sslmode=disable
      AGENT_RUNTIME_USE_GATEWAY: ${AGENT_RUNTIME_USE_GATEWAY:-true}
      AGENT_RUNTIME_GATEWAY_REQUIRED: ${AGENT_RUNTIME_GATEWAY_REQUIRED:-true}
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-http://ai-gateway:8787}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-groot-ai-gateway-dev-key}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/readyz')"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "${AGENT_RUNTIME_PORT:-8090}:8090"

  groot-api:
    image: ${GROOT_API_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_started
      agent-runtime:
        condition: service_healthy
    environment:
      GROOT_EDITION: community
      GROOT_TENANCY_MODE: single
      COMMUNITY_TENANT_NAME: ${COMMUNITY_TENANT_NAME}
      GROOT_HTTP_ADDR: :8080
      POSTGRES_DSN: postgres://groot:groot@postgres:5432/groot?sslmode=disable
      KAFKA_BROKERS: kafka:19092
      ROUTER_CONSUMER_GROUP: groot-community-router
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      GROOT_SECRETS_MASTER_KEY: ${GROOT_SECRETS_MASTER_KEY}
      GROOT_SYSTEM_API_KEY: ${GROOT_SYSTEM_API_KEY}
      AUTH_MODE: mixed
      API_KEY_HEADER: X-API-Key
      ADMIN_MODE_ENABLED: false
      AUDIT_ENABLED: true
      GROOT_ALLOW_GLOBAL_INSTANCES: true
      MAX_CHAIN_DEPTH: 10
      MAX_REPLAY_EVENTS: 1000
      MAX_REPLAY_WINDOW_HOURS: 24
      SCHEMA_VALIDATION_MODE: warn
      SCHEMA_REGISTRATION_MODE: startup
      SCHEMA_MAX_PAYLOAD_BYTES: 262144
      GRAPH_MAX_NODES: 5000
      GRAPH_MAX_EDGES: 20000
      GRAPH_EXECUTION_TRAVERSAL_MAX_EVENTS: 500
      GRAPH_EXECUTION_MAX_DEPTH: 25
      GRAPH_DEFAULT_LIMIT: 500
      GROOT_PUBLIC_BASE_URL: ${GROOT_PUBLIC_BASE_URL}
      GROOT_INTERNAL_TOOL_ENDPOINT_URL: ${GROOT_INTERNAL_TOOL_ENDPOINT_URL:-http://groot-api:8080/internal/agent-runtime/tool-calls}
      GROOT_INTEGRATION_PLUGIN_DIR: /app/integrations/plugins
      GROOT_INTEGRATION_FIRST_PARTY_PLUGINS_PATH: /app/integrations/first_party_plugins.json
      GROOT_INTEGRATION_INSTALLED_PATH: /app/integrations/installed.json
      GROOT_INTEGRATION_TRUSTED_KEYS_PATH: /app/integrations/trusted_keys.json
      GROOT_INTEGRATION_CACHE_DIR: /app/integrations/cache
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-http://ai-gateway:8787}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-groot-ai-gateway-dev-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE_URL: https://api.openai.com/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_API_BASE_URL: https://api.anthropic.com
      LLM_DEFAULT_PROVIDER: openai
      LLM_DEFAULT_CLASSIFY_MODEL: gpt-4o-mini
      LLM_DEFAULT_EXTRACT_MODEL: gpt-4o-mini
      LLM_TIMEOUT_SECONDS: 30
      AGENT_MAX_STEPS: 8
      AGENT_STEP_TIMEOUT_SECONDS: 30
      AGENT_TOTAL_TIMEOUT_SECONDS: 120
      AGENT_MAX_TOOL_CALLS: 8
      AGENT_MAX_TOOL_OUTPUT_BYTES: 16384
      AGENT_RUNTIME_ENABLED: true
      AGENT_RUNTIME_BASE_URL: http://agent-runtime:8090
      AGENT_RUNTIME_TIMEOUT_SECONDS: 30
      AGENT_SESSION_AUTO_CREATE: true
      AGENT_SESSION_MAX_IDLE_DAYS: 30
      AGENT_MEMORY_MODE: runtime_managed
      AGENT_MEMORY_SUMMARY_MAX_BYTES: 16384
      AGENT_RUNTIME_SHARED_SECRET: ${AGENT_RUNTIME_SHARED_SECRET}
      DELIVERY_MAX_ATTEMPTS: 10
      DELIVERY_INITIAL_INTERVAL: 2s
      DELIVERY_MAX_INTERVAL: 5m
    volumes:
      - ./integrations:/app/integrations
    ports:
      - "${GROOT_HTTP_PORT:-8080}:8080"

  frontend:
    image: ${GROOT_UI_IMAGE}
    depends_on:
      groot-api:
        condition: service_started
    environment:
      NODE_ENV: production
      GROOT_API_INTERNAL_BASE_URL: http://groot-api:8080
      NEXT_PUBLIC_GROOT_API_BASE_URL: http://localhost:${GROOT_HTTP_PORT:-8080}
    ports:
      - "${GROOT_UI_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000')
          .then(r=>{if(!r.ok)process.exit(1);return r.text()})
          .then(()=>process.exit(0))
          .catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  community-ai-gateway-state:
